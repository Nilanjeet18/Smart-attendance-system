spring.application.name=smart-attendance-system

# =============================================
# Smart Attendance System - Application Config
# =============================================

# Server
server.port=8080

# ---- MySQL DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/smart_attendance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Nilu@2804
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB 
spring.servlet.multipart.max-request-size=20MB

# ---- QR Code Settings ----

server.address=0.0.0.0
attendance.qr.expiry-minutes=10
attendance.qr.width=300
attendance.qr.height=300
attendance.qr.base-url=http://10.163.96.251:8080

# ---- Face Detection Settings ----
attendance.face.cascade-path=src/main/resources/haarcascade_frontalface_default.xml
attendance.face.min-face-size=50      
attendance.face.confidence-threshold=0.4

# ---- Attendance Rules ----
attendance.min-percentage=75.0
attendance.late-threshold-minutes=15

# ---- Report Output Path ----
attendance.report.output-dir=./reports/

# ---- JWT Security ----
jwt.secret=SmartAttendanceSecretKey2024VeryLongAndSecureKey
jwt.expiration=86400000

# ---- Logging ----
logging.level.com.attendance=DEBUG
logging.level.org.springframework.security=INFO